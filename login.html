<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps - Login / Signup</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/theme.js"></script>

    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Hide scrollbars for the full screen view */
        }

        .auth-container {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            min-height: 550px;
            border: 1px solid var(--border-color);
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .auth-container.right-panel-active .sign-in-container {
            transform: translateX(100%);
            opacity: 0;
            z-index: 1;
        }

        .auth-container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {

            0%,
            49.99% {
                opacity: 0;
                z-index: 1;
            }

            50%,
            100% {
                opacity: 1;
                z-index: 5;
            }
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .auth-container.right-panel-active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #FFFFFF;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .auth-container.right-panel-active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .auth-container.right-panel-active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .auth-container.right-panel-active .overlay-right {
            transform: translateX(20%);
        }

        .social-circle {
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px;
            height: 40px;
            width: 40px;
            text-decoration: none;
            color: var(--text-color);
            transition: var(--transition-speed);
        }

        .social-circle:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .auth-container {
                min-height: 100vh;
                border-radius: 0;
                border: none;
            }

            .form-container {
                width: 100%;
                padding: 2rem;
            }

            .sign-in-container {
                z-index: 2;
                opacity: 1;
                left: 0;
            }

            .sign-up-container {
                z-index: 1;
                opacity: 0;
                left: 0;
                display: none;
            }

            .overlay-container {
                display: none;
            }

            /* Mobile toggle button logic */
            .mobile-toggle {
                display: block;
                text-align: center;
                margin-top: 1rem;
            }

            /* Custom mobile active states */
            .auth-container.right-panel-active .sign-in-container {
                transform: none;
                display: none;
            }

            .auth-container.right-panel-active .sign-up-container {
                transform: none;
                display: flex;
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Back Home btn & Theme toggle -->
    <button class="theme-toggle position-absolute top-0 end-0 m-4 btn btn-link text-body p-0 z-3"
        aria-label="Toggle Theme"><i class="bi bi-sun fs-4"></i></button>

    <div class="container d-flex justify-content-center">
        <div class="auth-container d-flex align-items-center justify-content-center" id="authContainer"
            style="max-width: 500px; min-height: auto; padding: 3rem;">
            <!-- Sign In Form Only -->
            <div class="w-100 bg-body">
                <form action="dashboard.html" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none">
                            <i class="bi bi-boxes fs-2 text-primary mb-2 d-inline-block"></i>
                        </a>
                        <h2 class="fw-bold text-body mb-1">Sign in</h2>
                        <p class="text-muted small">Enter your credentials to access the dashboard</p>
                    </div>

                    <div class="d-flex justify-content-center mb-4">
                        <a href="#" class="social-circle"><i class="bi bi-google"></i></a>
                        <a href="#" class="social-circle"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="social-circle"><i class="bi bi-apple"></i></a>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email Address</label>
                        <input type="email" class="form-control rounded-3 py-2" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" class="form-control rounded-3 py-2" placeholder="••••••••" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4 w-100">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="small text-primary text-decoration-none">Forgot password?</a>
                    </div>

                    <button class="btn btn-primary rounded-pill w-100 fw-bold py-2 shadow-sm">Sign In</button>

                    <div class="text-center mt-4">
                        <p class="text-muted small mb-0">Don't have an account? <a href="signup.html"
                                class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
