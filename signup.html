<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps - Sign Up</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/theme.js"></script>

    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            min-height: 550px;
            border: 1px solid var(--border-color);
        }

        .social-circle {
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px;
            height: 40px;
            width: 40px;
            text-decoration: none;
            color: var(--text-color);
            transition: var(--transition-speed);
        }

        .social-circle:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- Back Home btn & Theme toggle -->
    <button class="theme-toggle position-absolute top-0 end-0 m-4 btn btn-link text-body p-0 z-3"
        aria-label="Toggle Theme"><i class="bi bi-sun fs-4"></i></button>

    <div class="container d-flex justify-content-center">
        <div class="auth-container d-flex align-items-center justify-content-center" id="authContainer"
            style="max-width: 500px; min-height: auto; padding: 3rem;">
            <div class="w-100 bg-body">
                <form action="login.html" onsubmit="event.preventDefault(); window.location.href='login.html';">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none">
                            <i class="bi bi-boxes fs-2 text-primary mb-2 d-inline-block"></i>
                        </a>
                        <h2 class="fw-bold text-body mb-1">Create Account</h2>
                        <p class="text-muted small">Enter your details to register</p>
                    </div>

                    <div class="d-flex justify-content-center mb-4">
                        <a href="#" class="social-circle"><i class="bi bi-google"></i></a>
                        <a href="#" class="social-circle"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="social-circle"><i class="bi bi-apple"></i></a>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Full Name</label>
                        <input type="text" class="form-control rounded-3 py-2" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email Address</label>
                        <input type="email" class="form-control rounded-3 py-2" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" class="form-control rounded-3 py-2" placeholder="••••••••" required>
                    </div>

                    <button class="btn btn-primary rounded-pill w-100 fw-bold py-2 shadow-sm mb-3">Sign Up</button>

                    <div class="text-center mt-4">
                        <p class="text-muted small mb-0">Already have an account? <a href="login.html"
                                class="text-primary fw-bold text-decoration-none">Sign In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
